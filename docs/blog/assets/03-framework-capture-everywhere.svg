<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 540" font-family="ui-monospace, 'SF Mono', Menlo, monospace">
  <defs>
    <pattern id="grid3" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#16324a" stroke-width="1"/>
    </pattern>
    <marker id="ar3" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0 0L7 3L0 6Z" fill="#5fb4d9"/>
    </marker>
    <marker id="ar3d" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0 0L7 3L0 6Z" fill="#ffcf6a"/>
    </marker>
  </defs>
  <rect width="1040" height="540" fill="#0a1929"/>
  <rect width="1040" height="540" fill="url(#grid3)"/>

  <text x="40" y="56" fill="#cfe8f5" font-size="26" font-weight="700">哪里都能用 —— 连没有文本 API 的地方</text>
  <line x1="40" y1="74" x2="1000" y2="74" stroke="#1e4860" stroke-width="1.5"/>

  <!-- apps row -->
  <text x="40" y="116" fill="#9fd4ea" font-size="15">任意 App 的选区</text>
  <g font-size="14" text-anchor="middle">
    <g fill="#0e2336" stroke="#5fb4d9" stroke-width="1.5">
      <rect x="40"  y="130" width="120" height="48" rx="8"/>
      <rect x="180" y="130" width="120" height="48" rx="8"/>
      <rect x="320" y="130" width="120" height="48" rx="8"/>
      <rect x="460" y="130" width="120" height="48" rx="8"/>
      <rect x="600" y="130" width="150" height="48" rx="8"/>
      <rect x="770" y="130" width="190" height="48" rx="8"/>
    </g>
    <g fill="#cfe8f5">
      <text x="100" y="159">Mail</text>
      <text x="240" y="159">Notes</text>
      <text x="380" y="159">Xcode</text>
      <text x="520" y="159">终端</text>
      <text x="675" y="159">浏览器</text>
      <text x="865" y="159">Electron / 网页</text>
    </g>
  </g>

  <!-- primary path -->
  <g stroke="#5fb4d9" stroke-width="1.8" fill="none" marker-end="url(#ar3)">
    <path d="M100 178V214"/>
    <path d="M240 178V214"/>
    <path d="M380 178V214"/>
    <path d="M520 178V214"/>
    <path d="M675 178V214"/>
  </g>
  <!-- fallback path from electron -->
  <path d="M865 178 V196 H880 V214" stroke="#ffcf6a" stroke-width="1.8" fill="none" marker-end="url(#ar3d)" stroke-dasharray="6 4"/>

  <!-- capture layer -->
  <rect x="40" y="222" width="700" height="64" rx="10" fill="#0e2336" stroke="#5fb4d9" stroke-width="2"/>
  <text x="60" y="250" fill="#cfe8f5" font-size="16">主路径 · Accessibility API</text>
  <text x="60" y="272" fill="#5fb4d9" font-size="13">kAXSelectedText — 直接读取原生选区</text>

  <rect x="770" y="222" width="230" height="64" rx="10" fill="#2a2410" stroke="#ffcf6a" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="788" y="250" fill="#ffe6a8" font-size="15">兜底 · 合成复制</text>
  <text x="788" y="272" fill="#ffcf6a" font-size="12">事后总还原剪贴板</text>

  <!-- merge to capture -->
  <path d="M390 286V322" stroke="#5fb4d9" stroke-width="2" fill="none" marker-end="url(#ar3)"/>
  <path d="M885 286 V304 H600 V322" stroke="#ffcf6a" stroke-width="1.8" fill="none" marker-end="url(#ar3d)" stroke-dasharray="6 4"/>

  <rect x="300" y="330" width="440" height="58" rx="10" fill="#0c2620" stroke="#7ee0c0" stroke-width="2"/>
  <text x="520" y="358" fill="#d7fff0" font-size="16" text-anchor="middle">SelectionCapture → 拿到文字</text>
  <text x="520" y="378" fill="#7ee0c0" font-size="12" text-anchor="middle">无论选区来自哪个 App</text>

  <path d="M520 388V424" stroke="#7ee0c0" stroke-width="2" fill="none" marker-end="url(#ar3)"/>
  <rect x="360" y="432" width="320" height="54" rx="10" fill="#0e2336" stroke="#5fb4d9" stroke-width="1.8"/>
  <text x="520" y="465" fill="#cfe8f5" font-size="15" text-anchor="middle">翻译（流式）→ 读：浮窗 / 写：替换</text>
</svg>
