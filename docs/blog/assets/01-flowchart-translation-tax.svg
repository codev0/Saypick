<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 560" font-family="ui-monospace, 'SF Mono', Menlo, monospace">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#16324a" stroke-width="1"/>
    </pattern>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0 0L7 3L0 6Z" fill="#5fb4d9"/>
    </marker>
    <marker id="arM" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0 0L7 3L0 6Z" fill="#7ee0c0"/>
    </marker>
  </defs>
  <rect width="1040" height="560" fill="#0a1929"/>
  <rect width="1040" height="560" fill="url(#grid)"/>

  <text x="40" y="56" fill="#cfe8f5" font-size="26" font-weight="700">翻译税：每句话都是一次上下文切换</text>
  <line x1="40" y1="74" x2="1000" y2="74" stroke="#1e4860" stroke-width="1.5"/>

  <!-- OLD WAY -->
  <text x="40" y="118" fill="#ff9f7a" font-size="17" letter-spacing="1">之前 · 复制粘贴循环</text>
  <g fill="#0e2336" stroke="#ff9f7a" stroke-width="1.6">
    <rect x="40"  y="140" width="150" height="60" rx="8"/>
    <rect x="240" y="140" width="150" height="60" rx="8"/>
    <rect x="440" y="140" width="170" height="60" rx="8"/>
    <rect x="240" y="250" width="170" height="60" rx="8"/>
    <rect x="40"  y="250" width="150" height="60" rx="8"/>
  </g>
  <g fill="#ffd9c7" font-size="15" text-anchor="middle">
    <text x="115" y="176">① 选中外文</text>
    <text x="315" y="176">② 复制</text>
    <text x="525" y="176">③ 切到翻译页</text>
    <text x="325" y="286">④ 复制译文</text>
    <text x="115" y="286">⑤ 切回 · 粘贴</text>
  </g>
  <g stroke="#ff9f7a" stroke-width="1.8" fill="none" marker-end="url(#ar)">
    <path d="M190 170H236" stroke="#ff9f7a"/>
    <path d="M390 170H436" stroke="#ff9f7a"/>
    <path d="M525 200V228 H325 V246" stroke="#ff9f7a"/>
    <path d="M240 280H196" stroke="#ff9f7a"/>
  </g>
  <path d="M115 250V214" stroke="#ff9f7a" stroke-width="1.8" fill="none" marker-end="url(#ar)" stroke-dasharray="5 4"/>
  <text x="640" y="230" fill="#ff9f7a" font-size="14">↻ 每条消息</text>
  <text x="640" y="252" fill="#ff9f7a" font-size="14">   重复一遍</text>

  <line x1="40" y1="356" x2="1000" y2="356" stroke="#1e4860" stroke-width="1" stroke-dasharray="3 5"/>

  <!-- SAYPICK WAY -->
  <text x="40" y="402" fill="#7ee0c0" font-size="17" letter-spacing="1">Saypick · 一个快捷键</text>
  <g fill="#0e2a2a" stroke="#7ee0c0" stroke-width="1.8">
    <rect x="40"  y="424" width="170" height="64" rx="8"/>
    <rect x="430" y="424" width="190" height="64" rx="8"/>
    <rect x="820" y="424" width="180" height="64" rx="8"/>
  </g>
  <g font-size="15" text-anchor="middle" fill="#d7fff0">
    <text x="125" y="461">选中 / 打字</text>
    <text x="525" y="455">⌥D 读  ·  ⌥R 写</text>
    <text x="525" y="476" fill="#7ee0c0" font-size="12">原地完成</text>
    <text x="910" y="461">读懂 / 已替换</text>
  </g>
  <g stroke="#7ee0c0" stroke-width="2.2" fill="none" marker-end="url(#arM)">
    <path d="M210 456H426"/>
    <path d="M620 456H816"/>
  </g>
</svg>
