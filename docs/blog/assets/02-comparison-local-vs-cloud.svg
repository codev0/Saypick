<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 540" font-family="ui-monospace, 'SF Mono', Menlo, monospace">
  <defs>
    <pattern id="grid2" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#16324a" stroke-width="1"/>
    </pattern>
    <marker id="ar2" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0 0L7 3L0 6Z" fill="#5fb4d9"/>
    </marker>
  </defs>
  <rect width="1040" height="540" fill="#0a1929"/>
  <rect width="1040" height="540" fill="url(#grid2)"/>

  <text x="40" y="56" fill="#cfe8f5" font-size="26" font-weight="700">一套接口，两种后端</text>
  <line x1="40" y1="74" x2="1000" y2="74" stroke="#1e4860" stroke-width="1.5"/>

  <!-- central router -->
  <rect x="420" y="120" width="200" height="70" rx="10" fill="#0e2336" stroke="#5fb4d9" stroke-width="2"/>
  <text x="520" y="150" fill="#cfe8f5" font-size="16" text-anchor="middle">TranslationService</text>
  <text x="520" y="172" fill="#5fb4d9" font-size="13" text-anchor="middle">路由 · 缓存 · 风格注入</text>
  <text x="520" y="106" fill="#9fd4ea" font-size="13" text-anchor="middle">选中 / 输入 ↓</text>
  <path d="M520 96V118" stroke="#5fb4d9" stroke-width="1.8" fill="none" marker-end="url(#ar2)"/>

  <path d="M420 165 C320 200 260 210 250 250" stroke="#7ee0c0" stroke-width="2" fill="none" marker-end="url(#ar2)"/>
  <path d="M620 165 C720 200 780 210 790 250" stroke="#9aa8ff" stroke-width="2" fill="none" marker-end="url(#ar2)"/>

  <!-- LOCAL -->
  <rect x="70" y="258" width="360" height="232" rx="12" fill="#0c2620" stroke="#7ee0c0" stroke-width="1.8"/>
  <text x="92" y="294" fill="#7ee0c0" font-size="19">● Ollama（本地）</text>
  <g fill="#d7fff0" font-size="15">
    <text x="92" y="332">⌁  模型跑在自己的 Mac 上</text>
    <text x="92" y="362">🔒 数据不出本机</text>
    <text x="92" y="392">✈  离线 · 飞机上也能用</text>
    <text x="92" y="422">∅  没有按 token 计费</text>
    <text x="92" y="452">⚙  未装则自动挑已装的模型</text>
  </g>
  <rect x="92" y="466" width="150" height="16" fill="none"/>
  <text x="92" y="478" fill="#6fcf9f" font-size="12">qwen2.5:3b · 本地推理</text>

  <!-- CLOUD -->
  <rect x="610" y="258" width="360" height="232" rx="12" fill="#141a30" stroke="#9aa8ff" stroke-width="1.8"/>
  <text x="632" y="294" fill="#9aa8ff" font-size="19">● OpenAI 兼容（云端）</text>
  <g fill="#dfe3ff" font-size="15">
    <text x="632" y="332">↗  任意 /chat/completions 接口</text>
    <text x="632" y="362">⚡ 追求极致速度</text>
    <text x="632" y="392">✦  可用前沿大模型</text>
    <text x="632" y="422">🔑 base URL + key + 模型名</text>
    <text x="632" y="452">⌁  逐 token 流式输出</text>
  </g>
  <text x="632" y="478" fill="#8a97e0" font-size="12">云端推理 · 自带模型</text>
</svg>
