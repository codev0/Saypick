<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 540" font-family="ui-monospace, 'SF Mono', Menlo, monospace">
  <defs>
    <pattern id="grid4" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#16324a" stroke-width="1"/>
    </pattern>
    <marker id="ar4" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0 0L7 3L0 6Z" fill="#5fb4d9"/>
    </marker>
    <marker id="ar4g" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0 0L7 3L0 6Z" fill="#7ee0c0"/>
    </marker>
  </defs>
  <rect width="1040" height="540" fill="#0a1929"/>
  <rect width="1040" height="540" fill="url(#grid4)"/>

  <text x="40" y="56" fill="#cfe8f5" font-size="26" font-weight="700">它是怎么工作的 · 原生 Swift 管线</text>
  <line x1="40" y1="74" x2="1000" y2="74" stroke="#1e4860" stroke-width="1.5"/>

  <!-- triggers -->
  <text x="60" y="120" fill="#9fd4ea" font-size="14" text-anchor="middle">触发</text>
  <g fill="#0e2336" stroke="#5fb4d9" stroke-width="1.6" font-size="13" text-anchor="middle">
    <rect x="40" y="132" width="200" height="40" rx="8"/>
    <rect x="40" y="184" width="200" height="40" rx="8"/>
    <rect x="40" y="236" width="200" height="40" rx="8"/>
  </g>
  <g fill="#cfe8f5" font-size="13" text-anchor="middle">
    <text x="140" y="157">全局快捷键</text>
    <text x="140" y="209">浮动图标</text>
    <text x="140" y="261">自动 · 划词即触发</text>
  </g>

  <!-- pipeline -->
  <g fill="#0e2336" stroke="#5fb4d9" stroke-width="1.8">
    <rect x="330" y="160" width="220" height="88" rx="10"/>
    <rect x="620" y="160" width="220" height="88" rx="10"/>
  </g>
  <text x="440" y="196" fill="#cfe8f5" font-size="16" text-anchor="middle">SelectionCapture</text>
  <text x="440" y="220" fill="#5fb4d9" font-size="12" text-anchor="middle">AX 选区 ─► 剪贴板兜底</text>
  <text x="440" y="238" fill="#5fb4d9" font-size="12" text-anchor="middle">（捕获后还原剪贴板）</text>

  <text x="730" y="190" fill="#cfe8f5" font-size="16" text-anchor="middle">TranslationService</text>
  <text x="730" y="214" fill="#5fb4d9" font-size="12" text-anchor="middle">路由 · 缓存 · 风格</text>
  <text x="730" y="232" fill="#5fb4d9" font-size="12" text-anchor="middle">Ollama / OpenAI · 流式</text>

  <g stroke="#5fb4d9" stroke-width="2" fill="none" marker-end="url(#ar4)">
    <path d="M240 204H326"/>
    <path d="M550 204H616"/>
  </g>

  <!-- split read / write -->
  <path d="M730 248 V286 H470 V312" stroke="#7ee0c0" stroke-width="2" fill="none" marker-end="url(#ar4g)"/>
  <path d="M730 248 V286 H800 V312" stroke="#7ee0c0" stroke-width="2" fill="none" marker-end="url(#ar4g)"/>

  <rect x="300" y="320" width="340" height="76" rx="10" fill="#0c2620" stroke="#7ee0c0" stroke-width="1.8"/>
  <text x="470" y="352" fill="#d7fff0" font-size="16" text-anchor="middle">读 · PopupController</text>
  <text x="470" y="376" fill="#7ee0c0" font-size="12" text-anchor="middle">浮窗流式显示 · 复制 / 替换</text>

  <rect x="660" y="320" width="340" height="76" rx="10" fill="#0c2620" stroke="#7ee0c0" stroke-width="1.8"/>
  <text x="830" y="352" fill="#d7fff0" font-size="16" text-anchor="middle">写 · TextReplacer</text>
  <text x="830" y="376" fill="#7ee0c0" font-size="12" text-anchor="middle">就地粘贴 · ⌘Z 可撤销</text>

  <!-- footer note -->
  <line x1="40" y1="430" x2="1000" y2="430" stroke="#1e4860" stroke-width="1" stroke-dasharray="3 5"/>
  <text x="40" y="466" fill="#9fd4ea" font-size="14">菜单栏应用（LSUIElement）· Dock 无图标 · 开机自启 · 可设「跳过 App」名单</text>
  <text x="40" y="492" fill="#5a7a90" font-size="13">Carbon 全局热键 · 辅助功能权限守护捕获与替换</text>
</svg>
